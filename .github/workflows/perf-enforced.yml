name: perf-enforced

on:
  pull_request:
    types: [opened, synchronize, reopened, edited]
    branches: [main, master]

jobs:
  perf-bundle:
    if: ${{ vars.PERF_PROFILE == 'production' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json
      - run: npm ci
      - run: npm run build
      - run: |
          if [[ -f scripts/perf/bundle-report.mjs && -f scripts/perf/compare-metric.mjs ]]; then
            npm run perf:bundle
            node scripts/perf/compare-metric.mjs .perf-baselines/bundle.json .perf-results/bundle.json totalBytes 0.08
          else
            echo "No bundle perf scripts found; skipping."
          fi

  perf-build:
    if: ${{ vars.PERF_PROFILE == 'production' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json
      - run: npm ci
      - run: |
          if [[ -f scripts/perf/measure-build-time.mjs && -f scripts/perf/compare-metric.mjs ]]; then
            npm run perf:build
            node scripts/perf/compare-metric.mjs .perf-baselines/build-time.json .perf-results/build-time.json buildMs 0.15
          else
            echo "No build perf scripts found; skipping."
          fi

  perf-assets:
    if: ${{ vars.PERF_PROFILE == 'production' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      - run: |
          if [[ -f scripts/perf/check-assets.sh ]]; then
            ASSET_MAX_BYTES=250000 bash scripts/perf/check-assets.sh
          else
            echo "No asset perf script found; skipping."
          fi

  perf-memory:
    if: ${{ vars.PERF_PROFILE == 'production' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json
      - run: npm ci
      - run: |
          if [[ -f scripts/perf/memory-smoke.mjs ]]; then
            MEMORY_MAX_DELTA_MB=5 npm run perf:memory
          else
            echo "No memory perf script found; skipping."
          fi

  perf-lighthouse:
    if: ${{ vars.PERF_PROFILE == 'production' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json
      - run: npm ci
      - run: npm run build
      - run: |
          if npm run | grep -q 'perf:lhci:prod'; then
            npm run perf:lhci:prod
          elif npm run | grep -q 'perf:lhci'; then
            npm run perf:lhci
          else
            echo "No Lighthouse perf script found; skipping."
          fi

  perf-api:
    if: ${{ vars.PERF_PROFILE == 'production' && vars.PERF_BASE_URL != '' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      - uses: grafana/setup-k6-action@db07bd9765aac508ef18982e52ab937fe633a065
      - run: |
          if [[ -f tests/perf/api.k6.js ]]; then
            k6 run tests/perf/api.k6.js --summary-export=.perf-results/api-summary.json
          else
            echo "No API perf script found; skipping."
          fi
        env:
          BASE_URL: ${{ vars.PERF_BASE_URL }}
          API_P95_MS: "250"
          API_P99_MS: "700"

  perf-db:
    if: ${{ vars.PERF_PROFILE == 'production' && vars.PERF_DATABASE_URL != '' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      - name: Install PostgreSQL client
        run: sudo apt-get update && sudo apt-get install -y postgresql-client
      - run: psql "${{ vars.PERF_DATABASE_URL }}" -f scripts/perf/db/check-pg-stat.sql
