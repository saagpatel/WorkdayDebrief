name: quality-gates

on:
  pull_request:
  push:
    branches: [main, master]

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Policy checks
        run: node scripts/ci/require-tests-and-docs.mjs

      - name: Verify commands
        run: bash .codex/scripts/run_verify_commands.sh

      - name: Diff coverage
        run: |
          base_ref="${GITHUB_BASE_REF:-main}"
          changed_files="$(git diff --name-only "origin/${base_ref}...HEAD")"
          if ! printf '%s\n' "$changed_files" | grep -Eq '^(src|app|server|api)/'; then
            echo "No production code changes; skipping diff coverage."
            exit 0
          fi
          if [[ ! -f coverage/lcov.info ]]; then
            echo "coverage/lcov.info is required for production code changes."
            exit 1
          fi
          python -m pip install --upgrade pip diff-cover
          diff-cover coverage/lcov.info --compare-branch="origin/${base_ref}" --fail-under=90

      - name: Upload test artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-artifacts
          path: |
            playwright-report/
            test-results/
            coverage/
