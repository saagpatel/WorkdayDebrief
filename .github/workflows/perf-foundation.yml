name: perf-foundation

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches: [main, master]

jobs:
  perf-bundle:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json
      - run: npm ci
      - run: npm run build
      - run: |
          if [[ -f scripts/perf/bundle-report.mjs ]]; then
            npm run perf:bundle
          else
            echo "No bundle perf script found; skipping."
          fi

  perf-build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json
      - run: npm ci
      - run: |
          if [[ -f scripts/perf/measure-build-time.mjs ]]; then
            npm run perf:build
          else
            echo "No build perf script found; skipping."
          fi

  perf-lighthouse:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json
      - run: npm ci
      - run: npm run build
      - run: |
          if npm run | grep -q 'perf:lhci'; then
            npm run perf:lhci || true
          else
            echo "No Lighthouse perf script found; skipping."
          fi

  perf-assets:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - run: |
          if [[ -f scripts/perf/check-assets.sh ]]; then
            bash scripts/perf/check-assets.sh
          else
            echo "No asset perf script found; skipping."
          fi

  perf-memory:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json
      - run: npm ci
      - run: |
          if [[ -f scripts/perf/memory-smoke.mjs ]]; then
            npm run perf:memory
          else
            echo "No memory perf script found; skipping."
          fi

  perf-api:
    if: ${{ vars.PERF_BASE_URL != '' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - uses: grafana/setup-k6-action@ffe7d7290dfa715e48c2ccc924d068444c94bde2
      - run: k6 run tests/perf/api.k6.js --summary-export=.perf-results/api-summary.json
        env:
          BASE_URL: ${{ vars.PERF_BASE_URL }}

  perf-db:
    if: ${{ vars.PERF_DATABASE_URL != '' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - name: Install PostgreSQL client
        run: sudo apt-get update && sudo apt-get install -y postgresql-client
      - run: psql "${{ vars.PERF_DATABASE_URL }}" -f scripts/perf/db/check-pg-stat.sql
